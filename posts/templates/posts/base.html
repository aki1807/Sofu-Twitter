<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofu Twitter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar bg-white border-bottom mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'home' %}">Sofu Twitter</a>
            
            <div class="d-flex gap-2 align-items-center">
                {% if user.is_authenticated %}
                    <span>{{ user.username }}</span>
                    <form action="{% url 'logout' %}" method="post">
                        {% csrf_token %}
                        <button class="btn btn-sm btn-outline-danger">ログアウト</button>
                    </form>
                {% else %}
                    <a class="btn btn-sm btn-dark" href="{% url 'signup' %}">登録</a>
                    <a class="btn btn-sm btn-outline-primary" href="{% url 'login' %}">ログイン</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
