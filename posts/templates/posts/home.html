<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <title>ホーム</title>
</head>
<body>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz" crossorigin="anonymous"></script>
<h1  class="text-center">投稿一覧</h1>

{% for post in posts %}
    <div>
        <h2>{{ post.title }}</h2>
        <p>{{ post.memo }}</p>
        <small>{{ post.created_at }}</small>
    </div>
    <hr>
{% empty %}
    <p>まだ投稿がありません。</p>
{% endfor %}
<a href="{% url 'create' %}" target="_blank" type="button" class="btn  btn-primary">新規投稿する</a>
    {% if user.is_authenticated  %}
        <li class="nav-item">
            <form action="{% url 'logout' %}" method="post"> 
                {% csrf_token %}
                <button type="submit button" class="btn btn-link nav-link fs-3 position-absolute bottom-0 start-0 btn btn-primary">ログアウト</button>
            </form>
        </li>
    {% endif %}
</body>
</html>
