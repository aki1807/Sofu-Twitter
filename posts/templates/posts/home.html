{% extends './base.html' %}

{% block content %}
    <a href="{% url 'create' %}" style="display:inline-block; margin-bottom:20px; padding:10px 20px; background:#1da1f2; color:white; text-decoration:none; border-radius:20px;">
    ＋ 新しい投稿を作成
    </a>

    {% for post in posts %}
        <div class="post">
            <p>{{ post.content }}</p>
            <p class="timestamp">{{ post.created_at }}</p>
        </div>
    {% empty %}
        <p>まだ投稿がありません。</p>
    {% endfor %}
{% endblock %}
