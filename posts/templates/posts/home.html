<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ホーム</title>
</head>
<body>

<h1>投稿一覧</h1>

{% for post in posts %}
    <div>
        <h2>{{ post.title }}</h2>
        <p>{{ post.memo }}</p>
        <small>{{ post.created_at }}</small>
    </div>
    <hr>
{% empty %}
    <p>まだ投稿がありません。</p>
{% endfor %}
<a href= "http://127.0.0.1:8000/create/" target="_blank" >新規投稿する</a>
</body>
</html>
