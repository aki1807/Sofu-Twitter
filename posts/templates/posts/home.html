<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ホーム</title>
</head>
<body>

<h1>投稿一覧</h1>

{% for post in posts %}
    <div>
        <h2>{{ post.title }}</h2>
        <p>{{ post.memo }}</p>
        <small>{{ post.created_at }}</small>
    </div>
    <hr>
{% empty %}
    <p>まだ投稿がありません。</p>
{% endfor %}
<a href="{% url 'create' %}" target="_blank">新規投稿する</a>
    {% if user.is_authenticated  %}
        <li class="nav-item">
            <form action="{% url 'logout' %}" method="post"> 
                {% csrf_token %}
                <button type="submit" class="btn btn-link nav-link">ログアウト</button>
            </form>
        </li>
    {% endif %}
</body>
</html>
