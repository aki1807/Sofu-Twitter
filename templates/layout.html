<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sofu Twitter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        body { background-color: #f5f8fa; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand bg-white border-bottom mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="{% url 'home' %}">Sofu Twitter</a>

            <ul class="navbar-nav flex-row gap-3 align-items-center">
                {% if user.is_authenticated %}
                    
                    <li class="nav-item">
                        <span class="nav-link text-dark fw-bold">{{ user.username }}さん</span>
                    </li>
                    <li class="nav-item">
                        <form action="{% url 'logout' %}" method="post">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-outline-danger btn-sm">ログアウト</button>
                        </form>
                    </li>

                {% else %}

                    <li class="nav-item">
                        <a class="btn btn-dark btn-sm" href="{% url 'signup' %}">新規登録</a>
                    </li>
                    <li class="nav-item">
                        <a class="btn btn-outline-primary btn-sm" href="{% url 'login' %}">ログイン</a>
                    </li>

                {% endif %}
                </ul>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
